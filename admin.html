<!DOCTYPE html>
<html>
<head>
    <title>Moderator VJ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #222; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #f1c40f; }
        button { background: #f1c40f; border: none; padding: 10px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Pesan Masuk:</h1>
    <div id="listPesan"></div>

    <script>
        const SUPABASE_URL = 'https://bgxcyhelvesrjlgqzlpg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJneGN5aGVsdmVzcmpsZ3F6bHBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMjE3MzQsImV4cCI6MjA5OTU5NzczNH0.eRbFwhily8DtfIHSptTV5U8zTehZCEANiZ0qEIt5uzc';
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadPesan() {
            const { data } = await sbClient.from('pesan_vj').select('*').eq('status', 'menunggu');
            const list = document.getElementById('listPesan');
            list.innerHTML = '';
            data.forEach(p => {
                list.innerHTML += `<div class="card">
                    <strong>${p.nama_pengirim}</strong><br>${p.isi_pesan}<br>
                    <button onclick="tayangkan(${p.id})">TAYANGKAN DI LAYAR</button>
                </div>`;
            });
        }

        async function tayangkan(id) {
            // Kita update statusnya menjadi 'tayang'
            await sbClient.from('pesan_vj').update({ status: 'tayang' }).eq('id', id);
            alert("Pesan dikirim ke Resolume!");
            loadPesan();
        }

        loadPesan();
    </script>
</body>
</html>
